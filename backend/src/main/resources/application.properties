# ===========================
# Application Configuration
# ===========================
spring.application.name=smart-tracker-backend
server.port=8080

# ===========================
# H2 In-Memory Database (Dev)
# ===========================
spring.datasource.url=jdbc:h2:mem:smarttrackerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===========================
# PostgreSQL (Production)
# Uncomment and fill in your credentials
# ===========================
# spring.datasource.url=jdbc:postgresql://localhost:5432/smarttrackerdb
# spring.datasource.username=postgres
# spring.datasource.password=yourpassword
# spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# For PostgreSQL use: org.hibernate.dialect.PostgreSQLDialect

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=SmartTrackerJwtSecretKey2024SuperSecureBase64EncodedKeyForProduction
app.jwt.expiration=86400000

# ===========================
# Swagger / OpenAPI
# ===========================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ===========================
# CORS
# ===========================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ===========================
# Logging
# ===========================
logging.level.com.smarttracker=INFO
logging.level.org.springframework.security=WARN
